name: Scrape V2Ray Configs

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'scraper.py'
      - '.github/workflows/scrape-v2ray.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Needed to push changes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            xvfb \
            unzip \
            wget
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
      
      - name: Create download directory
        run: mkdir -p v2ray_downloads
      
      - name: Run scraper
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          python scraper.py
      
      - name: Remove old config file
        run: |
          if [ -f "ALL_V2RAY_CONFIGS.txt" ]; then
            rm -f ALL_V2RAY_CONFIGS.txt
            echo "Old config file removed"
          fi
      
      - name: Verify output
        run: |
          if [ -f "ALL_V2RAY_CONFIGS.txt" ]; then
            echo "✅ Config file generated successfully"
            echo "File size: $(wc -c < ALL_V2RAY_CONFIGS.txt) bytes"
            echo "Total lines: $(wc -l < ALL_V2RAY_CONFIGS.txt)"
          else
            echo "❌ Config file not found!"
            exit 1
          fi
      
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Remove old file from tracking
          git rm --cached ALL_V2RAY_CONFIGS.txt 2>/dev/null || true
          
          # Add new files
          git add ALL_V2RAY_CONFIGS.txt
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto-update V2Ray configs [skip ci]"
            git push
            echo "✅ Changes pushed to repository"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact (optional backup)
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-configs
          path: ALL_V2RAY_CONFIGS.txt
          retention-days: 7
      
      - name: Cleanup
        if: always()
        run: |
          rm -rf v2ray_downloads/
          echo "Cleanup completed"
